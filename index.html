<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ta52 Welcome</title>
    <link rel="icon" href="house.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- background layer for parallax -->
    <div class="bg"></div>

    <!-- main content card */ -->
    <div class="content">
        <h1>Ta52 Services</h1>
        <div id="clock"></div>
        <!-- weather widget moved to bottom for cleaner layout -->
        <div class="search">
            <input type="text" id="googleSearch" placeholder="Search Google...">
            <button id="searchBtn">Go</button>
        </div>
        <div class="links">
            <a href="https://ta52.dk/jellyfin" target="_blank" rel="noopener">Jellyfin</a>
            <a href="https://fotos.ta52.dk" target="_blank" rel="noopener">Fotos</a>
            <a href="https://files.ta52.dk" target="_blank" rel="noopener">Files</a>
        </div>
        <div id="countdownContainer" class="countdown">
            <div class="countdown-box">
                <div class="countdown-value" id="countdownDays">0</div>
                <div class="countdown-label">Days</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-value" id="countdownHours">0</div>
                <div class="countdown-label">Hours</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-value" id="countdownMinutes">0</div>
                <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-value" id="countdownSeconds">0</div>
                <div class="countdown-label">Seconds</div>
            </div>
        </div>
        <div id="countdownMessage" class="countdown-message" style="display: none;"></div>
    </div>
    <!-- bottom weather widget -->
    <div class="weather bottom">
        <div id="weatherWidget" class="weather-widget">
            <div class="weather-main">
                <div class="weather-left">
                    <div id="weatherIcon" class="weather-icon">☀️</div>
                    <div class="weather-text">
                        <div id="weatherTemp" class="weather-temp">--°C</div>
                        <div id="weatherDesc" class="weather-desc">Loading weather...</div>
                    </div>
                </div>
            </div>
            <div class="weather-grid">
                <div>Wind: <span id="weatherWind">-- m/s</span></div>
                <div>Humidity: <span id="weatherHumidity">--%</span></div>
                <div>Sunrise: <span id="weatherSunrise">--:--</span></div>
                <div>Sunset: <span id="weatherSunset">--:--</span></div>
                <div>Updated: <span id="weatherUpdated">--</span></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
